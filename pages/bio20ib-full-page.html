<!DOCTYPE html>
<html>
    <head>
    <title> ChurchillDoc Home</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
    body {
    background-image: url('/images/bg1.png');
    background-repeat: no-repeat;
    background-attachment: fixed;  
    background-size: cover;
    }
    </style>


    
    <link rel="stylesheet" href="/css/styles.css">
    
    

    </head>
<body>

    <button class="toggle-btn" onclick="toggleNav()">☰</button>

    <div id="overlay"></div>

    <div id="mySidenav"class="sidenav">
        <a href="/pages/about.html"style="color: white;">About</a>
        <a href="/pages/subjects.html"style="color: white;">Subjects</a>
        <a href="/pages/tips.html"style="color: white;">Tips + Resources</a>
        <a href="/pages/contact.html"style="color: white;">Contact</a>
    </div>

    <div id="mainContent" class = "main">
        <div class = "content-wrapper">

            <h1>Placeholder</h1>

            <i>Background: Honkai Impact 3, Vol 2, all right reserved mihoyo</i>
        </div>
    </div>

    <script>
    function toggleNav() {
        const nav = document.getElementById("mySidenav");
        const content = document.getElementById("mainContent");
        const overlay = document.getElementById("overlay");

        // Check if the sidebar is currently NOT closed
        if (!nav.classList.contains("closed")) {
            // --- COLLAPSE ---
            nav.classList.add("closed");
            content.classList.add("shifted");
            overlay.classList.add("shifted-overlay");
        } else {
            // --- EXPAND ---
            nav.classList.remove("closed");
            content.classList.remove("shifted");
            overlay.classList.remove("shifted-overlay");
        }
    }
    </script>

</body>
</html>
